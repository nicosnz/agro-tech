services:
  database:
    image: postgres:16
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./db-desing:/docker-entrypoint-initdb.d
      - agrovolume:/var/lib/postgresql/data
    networks:
      - agrotech-private
    restart: always
  admin:
    build: ./src/admin
    expose:
      - "8000"
    networks:
      - agrotech-private
    env_file:
      - .env
    restart: always
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
  vaquero:
    build: ./src/api-vaquero
    expose:
      - "8001"
    networks:
      - agrotech-private
    restart: always
    depends_on:
      database:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
  proxy:
    build:
      context: ./src/agrotech-ui
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "80:80"
    networks:
      - agrotech-private
      - agrotech-public
    restart: always
    depends_on:
      vaquero:
        condition: service_healthy
      admin:
        condition: service_started
    volumes:
      - ./proxy-reverse/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - agrotech-private
    restart: always

  elasticsearch:
    image: elasticsearch:8.13.0
    expose:
      - "9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - agrotech-private
    restart: always

volumes:
  agrovolume:
  static_volume:
  media_volume:
networks:
  agrotech-public:
    internal: false
  agrotech-private:
    internal: true
