server {
    listen 80;
    server_name agrotech.chickenkiller.com www.agrotech.chickenkiller.com api.agrotech.chickenkiller.com;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.agrotech.chickenkiller.com;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/agrotech.chickenkiller.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agrotech.chickenkiller.com/privkey.pem;

    return 301 https://agrotech.chickenkiller.com$request_uri;
}

# Frontend + Admin
server {
    listen 443 ssl;
    server_name agrotech.chickenkiller.com;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/agrotech.chickenkiller.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agrotech.chickenkiller.com/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location /admin/ {
        proxy_pass http://admin:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# API
server {
    listen 443 ssl;
    server_name api.agrotech.chickenkiller.com;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/api.agrotech.chickenkiller.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.agrotech.chickenkiller.com/privkey.pem;

    location /api/v1/ {
        proxy_pass http://vaquero:8001/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /docs {
        proxy_pass http://vaquero:8001/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://vaquero:8001/openapi.json;
        proxy_set_header Host $host;
    }
}
